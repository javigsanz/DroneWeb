<section class="testimonials" aria-labelledby="testimonials-title">
  <div class="container" appRevealOnScroll>
    <header class="section-heading">
      <h2 id="testimonials-title">Testimonios</h2>
      <p>Empresas que ya elevaron su narrativa visual con J2 Drones.</p>
    </header>

    <div class="testimonials__viewport" [style.transform]="'translateX(-' + activeIndex * 100 + '%)'">
      @for (item of testimonials; track item.id) {
        <article class="testimonial-card" aria-roledescription="slide">
          <img [src]="item.photo" [alt]="'Foto de ' + item.name" loading="lazy" />
          <blockquote>
            <p>{{ item.quote }}</p>
          </blockquote>
          <h3>{{ item.name }}</h3>
          <span>{{ item.company }}</span>
        </article>
      }
    </div>

    <div class="testimonials__dots" role="tablist" aria-label="Seleccionar testimonio">
      @for (item of testimonials; track item.id; let i = $index) {
        <button
          type="button"
          role="tab"
          [attr.aria-selected]="activeIndex === i"
          [class.is-active]="activeIndex === i"
          (click)="goTo(i)"
          [attr.aria-label]="'Ir al testimonio ' + (i + 1)"
        ></button>
      }
    </div>
  </div>
</section>
